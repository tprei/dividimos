name: Synthetic Tests

on:
  push:
    branches: [main]
  pull_request:

env:
  NEXT_PUBLIC_SUPABASE_URL: http://localhost:54321
  PIX_ENCRYPTION_KEY: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
  NEXT_PUBLIC_DEV_LOGIN_ENABLED: "true"

jobs:
  synthetic:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        shard: ${{ github.event_name == 'pull_request' && fromJSON('[1, 2]') || fromJSON('[1, 2, 3]') }}
        total: ${{ github.event_name == 'pull_request' && fromJSON('[2]') || fromJSON('[3]') }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: supabase/setup-cli@v1

      - run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Start Supabase
        id: supabase
        run: |
          supabase start -x vector,imgproxy,logflare,edge-runtime
          STATUS=$(supabase status --output json)
          echo "anon_key=$(echo "$STATUS" | jq -r '.ANON_KEY')" >> $GITHUB_OUTPUT
          echo "service_role_key=$(echo "$STATUS" | jq -r '.SERVICE_ROLE_KEY')" >> $GITHUB_OUTPUT
          echo "jwt_secret=$(echo "$STATUS" | jq -r '.JWT_SECRET')" >> $GITHUB_OUTPUT

      - name: Cache Next.js build
        if: github.event_name != 'pull_request'
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ hashFiles('src/**') }}
          restore-keys: nextjs-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-

      - name: Build app
        if: github.event_name != 'pull_request'
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ steps.supabase.outputs.anon_key }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ steps.supabase.outputs.service_role_key }}

      - name: Start server (production)
        if: github.event_name != 'pull_request'
        run: npm run start &
        env:
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ steps.supabase.outputs.anon_key }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ steps.supabase.outputs.service_role_key }}

      - name: Start server (Turbopack dev)
        if: github.event_name == 'pull_request'
        run: npx next dev --turbopack &
        env:
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ steps.supabase.outputs.anon_key }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ steps.supabase.outputs.service_role_key }}

      - name: Wait for server
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000 > /dev/null && exit 0
            sleep 2
          done
          echo "Server did not start in time" && exit 1

      - name: Run synthetic tests
        run: npm run test:synthetic -- --shard=${{ matrix.shard }}/${{ matrix.total }}
        env:
          CI: "true"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ steps.supabase.outputs.anon_key }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ steps.supabase.outputs.service_role_key }}
          SUPABASE_JWT_SECRET: ${{ steps.supabase.outputs.jwt_secret }}
          E2E_BASE_URL: http://localhost:3000

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: synthetic-test-results-shard-${{ matrix.shard }}
          path: |
            playwright-report/
            test-results/
          retention-days: 7
